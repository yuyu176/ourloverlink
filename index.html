<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Random Joke Generator</title>
  <style>
    body { font-family: sans-serif; background: #f9f9f9; display: flex; flex-direction: column; align-items: center; margin-top: 100px;}
    #joke { margin: 20px 0; background: #fff; padding: 20px; border-radius: 8px; min-width: 300px; min-height: 60px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);}
    button { padding: 10px 20px; border: none; border-radius: 4px; background: #2a67a8; color: #fff; font-size: 16px; cursor: pointer;}
    button:hover { background: #224e7a; }
  </style>
</head>
<body>
  <h1>Random Joke Generator</h1>
  <div id="joke">Click the button to get a joke!</div>
  <button onclick="getJoke()">Get Joke</button>

  <script>
    async function getJoke() {
      const jokeDiv = document.getElementById('joke');
      jokeDiv.textContent = 'Loading...';
      try {
        const response = await fetch('https://official-joke-api.appspot.com/random_joke');
        if (!response.ok) throw new Error("Failed to fetch joke");
        const joke = await response.json();
        jokeDiv.innerHTML = `<strong>${joke.setup}</strong><br>${joke.punchline}`;
      } catch (e) {
        jokeDiv.textContent = "Couldn't fetch a joke. Try again!";
      }
    }
  </script>
</body>
</html>
