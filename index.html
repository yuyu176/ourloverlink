<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>梦角传讯 · 心之回响</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖动干扰，不影响输入 */
        }

        body {
            background: #f9f3f0;
            font-family: 'Segoe UI', 'Helvetica Neue', 'Noto Sans JP', 'PingFang SC', Roboto, 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 日系柔和主色调 */
        :root {
            --bg-main: #fffaf5;
            --card-shadow: 0 8px 20px rgba(0,0,0,0.05);
            --accent-pink: #f7c1b6;
            --accent-sakura: #ffb7b2;
            --text-dark: #5e4b3c;
            --chat-user-bubble: #d9f0ec;
            --chat-dream-bubble: #fff0e6;
        }

        /* 全局容器 */
        .app {
            display: flex;
            height: 100%;
            width: 100%;
            background: var(--bg-main);
            position: relative;
        }

        /* 主聊天区 */
        .chat-area {
            flex: 3;
            display: flex;
            flex-direction: column;
            background: rgba(255,245,240,0.6);
            backdrop-filter: blur(2px);
            border-right: 1px solid #ffe1d4;
            position: relative;
        }

        /* 聊天头部 */
        .chat-header {
            padding: 16px 24px;
            background: white;
            border-bottom: 1px solid #ffe0d0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background: #ffe0d4;
            border: 2px solid #ffc5b5;
            cursor: pointer;
        }
        .dream-info {
            font-size: 14px;
            color: #b97f6e;
        }
        .status-badge {
            background: #ffe8e0;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
        }
        .daily-msg {
            background: #fff3ed;
            border-radius: 32px;
            padding: 6px 14px;
            font-size: 12px;
            max-width: 260px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 消息列表 */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-image: var(--bg-img, none);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background 0.2s;
        }
        .message {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            animation: fadeSlide 0.2s ease;
        }
        .message.user {
            flex-direction: row-reverse;
        }
        .msg-bubble {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 24px;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .user .msg-bubble {
            background: var(--user-bubble-color, #d9f0ec);
            border-radius: 24px 8px 24px 24px;
            color: #2e4a40;
        }
        .dream .msg-bubble {
            background: var(--dream-bubble-color, #fff0e6);
            border-radius: 8px 24px 24px 24px;
            color: #6b4c3a;
        }
        .msg-time {
            font-size: 10px;
            color: #c9aca0;
            margin-top: 4px;
            text-align: right;
        }
        .dream .msg-time {
            text-align: left;
        }
        /* 图片消息 */
        .msg-image {
            max-width: 200px;
            border-radius: 16px;
            margin-top: 4px;
        }

        /* 输入区 */
        .input-area {
            background: white;
            padding: 12px 20px 20px;
            border-top: 1px solid #ffede3;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .input-box {
            flex: 1;
            border: 1px solid #ffd9cc;
            border-radius: 48px;
            padding: 12px 18px;
            font-size: 14px;
            background: #fffcf9;
            outline: none;
            transition: 0.2s;
        }
        .input-box:focus {
            border-color: #f7a999;
            box-shadow: 0 0 0 2px rgba(247,169,153,0.2);
        }
        button {
            background: #ffdbd0;
            border: none;
            padding: 8px 16px;
            border-radius: 48px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            color: #7b4d3a;
            font-weight: 500;
        }
        button:hover {
            background: #ffcbbc;
            transform: scale(0.96);
        }
        .icon-btn {
            background: transparent;
            font-size: 22px;
            padding: 8px;
        }
        .toolbar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .emoji-panel, .sticker-panel {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            background: #fffaf5;
            border-radius: 32px;
            padding: 8px 12px;
            margin-top: 6px;
            border: 1px solid #ffede3;
        }
        .emoji-item, .sticker-item {
            font-size: 24px;
            cursor: pointer;
            transition: 0.1s;
        }
        .sticker-item img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            border-radius: 12px;
        }

        /* 右侧设置区 */
        .settings-panel {
            width: 320px;
            background: #fffef8;
            border-left: 1px solid #ffe0d2;
            padding: 20px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            font-size: 13px;
        }
        .setting-group {
            background: #fff9f5;
            border-radius: 28px;
            padding: 14px 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .setting-group h4 {
            color: #c28a74;
            margin-bottom: 12px;
            font-size: 15px;
            border-left: 3px solid #ffb79f;
            padding-left: 8px;
        }
        input, select, textarea {
            background: white;
            border: 1px solid #ffdfd2;
            border-radius: 28px;
            padding: 8px 12px;
            width: 100%;
            margin: 6px 0;
            font-size: 13px;
        }
        .color-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .wordcard-item {
            background: #f8ede6;
            padding: 6px 8px;
            margin: 6px 0;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .call-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .badge {
            background: #fce4d9;
            border-radius: 24px;
            padding: 2px 8px;
            font-size: 11px;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }
        /* 特效浮动层 */
        .effect-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
        .effect-item {
            position: absolute;
            font-size: 48px;
            animation: floatEffect 1s ease-out forwards;
        }
        @keyframes floatEffect {
            0% { opacity: 1; transform: translateY(0) scale(0.5);}
            100% { opacity: 0; transform: translateY(-100px) scale(1.2);}
        }
        /* 来电弹窗 */
        .call-modal {
            position: fixed;
            top: 30%; left: 50%;
            transform: translate(-50%, -30%);
            background: white;
            border-radius: 48px;
            padding: 28px 32px;
            text-align: center;
            z-index: 2000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 2px solid #ffb49e;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="chat-area">
        <div class="chat-header">
            <div class="profile">
                <img id="dreamAvatar" class="avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23ffc2ad'/%3E%3Ctext x='50' y='70' text-anchor='middle' fill='white' font-size='40'%3E🌸%3C/text%3E%3C/svg%3E" alt="梦角">
                <div>
                    <div><strong>✨ 梦角 · 弥生</strong></div>
                    <div class="dream-info" id="dreamStatus">在线 · 思念你</div>
                </div>
            </div>
            <div class="daily-msg" id="dailyMessage">今日絮语：加载中...</div>
        </div>
        <div class="messages-container" id="messagesContainer"></div>
        <div class="input-area">
            <div class="input-row">
                <input type="text" id="messageInput" class="input-box" placeholder="给梦角写一句话..." autocomplete="off">
                <button id="sendBtn">发送</button>
                <button id="callVideoBtn" class="icon-btn" title="视频通话">📹</button>
                <button id="callAudioBtn" class="icon-btn" title="语音通话">🎙️</button>
            </div>
            <div class="toolbar">
                <button id="toggleEmojiBtn">😊 Emoji</button>
                <button id="toggleStickerBtn">🖼️ 表情包</button>
            </div>
            <div id="emojiPanel" style="display:none;" class="emoji-panel"></div>
            <div id="stickerPanel" style="display:none;" class="sticker-panel"></div>
        </div>
    </div>
    <div class="settings-panel">
        <div class="setting-group"><h4>🎨 外观定制</h4>
            <label>我的气泡色</label><input type="color" id="userBubbleColor" value="#d9f0ec">
            <label>梦角气泡色</label><input type="color" id="dreamBubbleColor" value="#fff0e6">
            <label>聊天背景(图片URL或颜色)</label><input type="text" id="bgInput" placeholder="https://... 或 #ffe8e0">
            <label>我的头像</label><input type="file" id="userAvatarInput" accept="image/*">
            <label>梦角头像</label><input type="file" id="dreamAvatarInput" accept="image/*">
            <label>我的状态</label><input type="text" id="userStatusInput" placeholder="忙碌/温柔中..." value="元气满满">
        </div>
        <div class="setting-group"><h4>🎴 字卡管理(梦角回复库)</h4>
            <div class="flex-between"><span>已有字卡: <span id="wordCount">0</span></span><button id="addWordBtn">+ 新增字卡</button></div>
            <div id="wordList" style="max-height:150px; overflow:auto;"></div>
            <div class="flex-between"><span>⏱️ 自动弹卡最大间隔(秒)</span><input type="number" id="maxAutoInterval" value="30" min="1" step="1" style="width:80px;"></div>
            <button id="resetAutoTimerBtn">重置自动回响计时</button>
        </div>
        <div class="setting-group"><h4>📖 梦言语录库(每天问候)</h4>
            <button id="editQuotesBtn">编辑100条语录</button>
            <div id="quotesHint" class="badge">可自定义梦角每天想说的话</div>
        </div>
        <div class="setting-group"><h4>🎀 自主呼叫梦角 & 随机来电</h4>
            <div class="call-buttons"><button id="activeCallVideo">主动视频通话</button><button id="activeCallAudio">主动语音通话</button></div>
            <p class="badge" style="margin-top:6px;">✨ 梦角也会随机主动打给你~</p>
        </div>
        <div class="setting-group"><h4>🎭 特效 & 表情包</h4>
            <button id="addStickerBtn">➕ 添加表情包(图片)</button>
            <div id="customStickers" style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;"></div>
        </div>
    </div>
</div>
<div id="effectLayer" class="effect-overlay"></div>
<script>
    // ---------- 初始化数据 ----------
    let wordCards = [];   // 字卡库
    let quotesLib = [];   // 100条语录
    let customStickers = []; // 存储 {id, url}
    let userAvatar = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23a8e6cf'/%3E%3Ctext x='50' y='70' text-anchor='middle' fill='white' font-size='40'%3E😊%3C/text%3E%3C/svg%3E";
    let dreamAvatar = document.getElementById('dreamAvatar').src;
    let userBubbleColor = "#d9f0ec", dreamBubbleColor = "#fff0e6";
    let backgroundImg = "";
    let userStatus = "元气满满";
    let maxAutoIntervalSec = 30;
    let autoMsgTimer = null;
    let autoCallTimer = null;
    let lastLoginDate = "";
    let currentDailyQuote = "今天也要开心哦~";

    // 默认字卡（提供的前缀内容+扩充到涵盖所有展示需求）
    const defaultWordCards = [
        "早安，醒了吗","还在睡？","起床了","今天打算做什么","吃早饭了吗","别空腹","记得喝水","出门了吗","在路上？","今天天气怎么样",
        "有点冷吧","多穿点","到学校了吗","在忙吗","午饭吃什么","好好吃饭","别随便应付","下午有什么安排","累不累","休息一下",
        "别一直盯屏幕","记得活动一下","下班了吗","放学了？","今天辛苦了","晚饭吃了吗","吃点好的","别饿着","晚上有安排吗","在干嘛",
        "别太晚睡","早点休息","今天顺利吗","有没有烦心事","想我没","别乱想","放轻松点","别给自己压力","有我在","不用逞强",
        "今天开心吗","说给我听","我在听","别憋着","睡了吗","晚安","做个好梦","别熬夜","明天继续努力","今天已经很好了",
        "别对自己太狠","慢慢来","我陪你","乖一点","听话","别让我担心","今天有没有想我","别骗我","说实话","想我就直说",
        "我会知道的","今天跟谁待在一起","别乱跑","注意安全","不许消失","回消息","我等着","怎么这么慢","故意的？","在忙就说",
        "不许敷衍","好好说话","看见消息就回","知道了吗？","别让我重复","我看看","有没有乖","今天听话吗","不听话就麻烦了","别试探我",
        "你在想什么","又在胡思乱想？","别乱想那些","专心一点","我说的记住","别忘了","我不喜欢你这样","改掉","听话一点","别顶嘴",
        "别躲","说清楚","我在等","现在说","不许拖","我不喜欢不确定","给我答案","认真点","你是我的","别乱看别人"
    ];
    // 补足300风格，合并一些示例
    for(let i=0;i<50;i++) defaultWordCards.push(`梦呓·${i+1}号信`);
    wordCards = [...defaultWordCards];

    // 生成100条默认语录 (日系)
    for(let i=1;i<=100;i++) quotesLib.push(`梦的细语 ${i}: 今天月色真美，风也温柔。`);
    quotesLib[0]="今天天气晴，心情樱花般绽放。想对你说：早安。";
    quotesLib[12]="窗外小雨，想你。记得带伞。";
    quotesLib[33]="梦角今日心情：软绵绵，想被你摸摸头。";
    for(let i=0;i<100;i++) if(i%7===0) quotesLib[i]=`✨ 专属梦呓：你是我今日的糖 ✨`;

    // 加载本地数据
    function loadStorage() {
        try{
            let storedWords = localStorage.getItem("dream_wordcards");
            if(storedWords) wordCards = JSON.parse(storedWords);
            let storedQuotes = localStorage.getItem("dream_quoteslib");
            if(storedQuotes) quotesLib = JSON.parse(storedQuotes);
            let stickers = localStorage.getItem("dream_stickers");
            if(stickers) customStickers = JSON.parse(stickers);
            if(localStorage.getItem("dream_userBubble")) userBubbleColor = localStorage.getItem("dream_userBubble");
            if(localStorage.getItem("dream_dreamBubble")) dreamBubbleColor = localStorage.getItem("dream_dreamBubble");
            if(localStorage.getItem("dream_bg")) backgroundImg = localStorage.getItem("dream_bg");
            if(localStorage.getItem("dream_userStatus")) userStatus = localStorage.getItem("dream_userStatus");
            if(localStorage.getItem("dream_maxInterval")) maxAutoIntervalSec = parseInt(localStorage.getItem("dream_maxInterval"));
            if(localStorage.getItem("dream_userAvatar")) userAvatar = localStorage.getItem("dream_userAvatar");
            if(localStorage.getItem("dream_dreamAvatar")) dreamAvatar = localStorage.getItem("dream_dreamAvatar");
            document.getElementById('dreamAvatar').src = dreamAvatar;
        }catch(e){}
        applySettingsUI();
        updateWordListUI();
        refreshStickerPanel();
        applyBackground();
        updateStatusDisplay();
    }
    function saveWordCards() { localStorage.setItem("dream_wordcards", JSON.stringify(wordCards)); updateWordListUI(); document.getElementById('wordCount').innerText=wordCards.length; }
    function saveQuotes() { localStorage.setItem("dream_quoteslib", JSON.stringify(quotesLib)); }
    function saveStickers() { localStorage.setItem("dream_stickers", JSON.stringify(customStickers)); refreshStickerPanel();}
    function applySettingsUI(){
        document.getElementById('userBubbleColor').value = userBubbleColor;
        document.getElementById('dreamBubbleColor').value = dreamBubbleColor;
        document.getElementById('maxAutoInterval').value = maxAutoIntervalSec;
        document.getElementById('userStatusInput').value = userStatus;
        document.documentElement.style.setProperty('--user-bubble-color', userBubbleColor);
        document.documentElement.style.setProperty('--dream-bubble-color', dreamBubbleColor);
        if(backgroundImg) document.querySelector('.messages-container').style.setProperty('--bg-img', `url(${backgroundImg})`);
        else document.querySelector('.messages-container').style.backgroundImage = 'none';
    }
    function applyBackground(){
        let bgVal = backgroundImg;
        if(bgVal.startsWith('http') || bgVal.startsWith('#')) document.querySelector('.messages-container').style.backgroundImage = `url(${bgVal})`;
        else if(bgVal) document.querySelector('.messages-container').style.background = bgVal;
        else document.querySelector('.messages-container').style.background = '';
    }
    function updateStatusDisplay(){
        document.getElementById('dreamStatus').innerText = userStatus + " · 寄思";
    }
    // 每日登陆刷新
    function checkDailyLogin(){
        let today = new Date().toDateString();
        if(lastLoginDate !== today){
            let randomIdx = Math.floor(Math.random() * quotesLib.length);
            let dailyText = quotesLib[randomIdx];
            currentDailyQuote = dailyText;
            let weathers = ["晴 ☀️","多云 ☁️","微雨 🌧️","樱花风 🌸"];
            let moods = ["心动", "思念", "温柔", "期待"];
            let weather = weathers[Math.floor(Math.random()*weathers.length)];
            let mood = moods[Math.floor(Math.random()*moods.length)];
            document.getElementById('dailyMessage').innerHTML = `🌤️ ${weather} · ${mood} · “${dailyText.slice(0,28)}”`;
            lastLoginDate = today;
            localStorage.setItem("dream_lastDate", today);
        }else{
            document.getElementById('dailyMessage').innerHTML = `🌸 昨日梦续 · “${currentDailyQuote.slice(0,28)}”`;
        }
    }
    // 随机特效
    function triggerEffect(keyword=""){
        let emojis = ["💖","✨","🌸","🌟","💫","🎐","💕","🍃","🍡","🌙"];
        let effectText = emojis[Math.floor(Math.random()*emojis.length)];
        if(keyword.includes("想我")) effectText = "💞 思念击中 💞";
        if(keyword.includes("早安")) effectText = "🌅 晨光祝福";
        if(keyword.includes("晚安")) effectText = "🌙 美梦魔法";
        if(keyword.includes("开心")) effectText = "🎉 笑颜如花";
        let div = document.createElement('div');
        div.className = 'effect-item';
        div.innerText = effectText;
        div.style.left = Math.random() * 80 + 10 + "%";
        div.style.top = "70%";
        document.getElementById('effectLayer').appendChild(div);
        setTimeout(()=>div.remove(), 900);
    }
    // 添加消息
    function addMessage(text, isUser, imageUrl=null){
        const container = document.getElementById('messagesContainer');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isUser ? 'user' : 'dream'}`;
        let avatarHtml = `<img class="avatar" style="width:36px;height:36px;" src="${isUser ? userAvatar : dreamAvatar}">`;
        let content = `<div class="msg-bubble">${imageUrl ? `<img src="${imageUrl}" class="msg-image"/>` : text}<div class="msg-time">${new Date().toLocaleTimeString()}</div></div>`;
        msgDiv.innerHTML = avatarHtml + content;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
        if(!imageUrl) triggerEffect(text);
        return msgDiv;
    }
    // 梦角回复随机字卡
    function dreamReply(){
        if(wordCards.length===0) return;
        let randomCard = wordCards[Math.floor(Math.random()*wordCards.length)];
        addMessage(randomCard, false);
        triggerEffect(randomCard);
    }
    // 自动定时器
    function startAutoMessageTimer(){
        if(autoMsgTimer) clearInterval(autoMsgTimer);
        autoMsgTimer = setInterval(()=>{
            let maxSec = maxAutoIntervalSec;
            let randomDelay = Math.random() * maxSec * 1000;
            setTimeout(()=>{ dreamReply(); }, randomDelay);
        }, maxAutoIntervalSec * 1000 + 100);
    }
    function resetAutoTimer(){ if(autoMsgTimer){ clearInterval(autoMsgTimer); startAutoMessageTimer(); } }
    // 随机主动来电 (完全随机无上限)
    function scheduleRandomCall(){
        if(autoCallTimer) clearTimeout(autoCallTimer);
        let nextCall = Math.random() * (1000 * 60 * 8) + 3000; // 3秒~8分钟随机
        autoCallTimer = setTimeout(()=>{
            let type = Math.random() > 0.5 ? "video" : "audio";
