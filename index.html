<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>梦角传讯链接 · 随缘之梦</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #eef2f5;
            font-family: 'Inter', 'Noto Serif JP', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app-container {
            width: 1300px;
            max-width: 98vw;
            height: 90vh;
            background: #fff9f5;
            border-radius: 42px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.6);
            display: flex;
            overflow: hidden;
        }
        /* 左侧设置面板 */
        .settings-panel {
            width: 300px;
            background: #fef7e8;
            border-right: 1px solid #f0e2d0;
            padding: 20px 18px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            font-size: 13px;
        }
        .settings-panel::-webkit-scrollbar { width: 4px; }
        .settings-panel h3 {
            font-size: 15px;
            font-weight: 600;
            color: #b48c6c;
            border-left: 3px solid #e3c9b0;
            padding-left: 10px;
            margin-bottom: 12px;
        }
        .setting-group {
            background: white;
            border-radius: 24px;
            padding: 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
        }
        .setting-item {
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .setting-item label {
            font-weight: 500;
            color: #7f6148;
            font-size: 12px;
        }
        input, select, textarea, button {
            background: #fffaf5;
            border: 1px solid #eeddcc;
            border-radius: 40px;
            padding: 8px 14px;
            font-size: 13px;
            outline: none;
            font-family: inherit;
        }
        button {
            background: #f0e2d4;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }
        button.primary {
            background: #d9c2a7;
            color: white;
            border: none;
        }
        button.small {
            padding: 4px 10px;
            font-size: 11px;
        }
        .wordcard-list {
            max-height: 180px;
            overflow-y: auto;
            background: #fff8f0;
            border-radius: 20px;
            padding: 8px;
            font-size: 12px;
        }
        .card-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            border-bottom: 1px solid #f0e0cf;
        }
        .emoji-palette {
            display: grid;
            grid-template-columns: repeat(6,1fr);
            gap: 8px;
            margin-top: 8px;
        }
        .emoji-btn {
            background: #fef2e6;
            border-radius: 30px;
            font-size: 20px;
            padding: 6px;
            text-align: center;
            cursor: pointer;
        }
        /* 右侧聊天主区域 */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-size: cover;
            background-position: center;
            transition: background-image 0.2s;
            background-color: #fffaf2;
        }
        .chat-header {
            padding: 16px 24px;
            background: rgba(255,248,240,0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #ffe5d0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-area {
            display: flex;
            gap: 12px;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .avatar-img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            background: #e1cfb5;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .message {
            display: flex;
            max-width: 80%;
            animation: fadeUp 0.2s ease;
        }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .bubble {
            padding: 10px 16px;
            border-radius: 24px;
            font-size: 14px;
            line-height: 1.4;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            word-break: break-word;
        }
        .message.user .bubble {
            background-color: #cfe9df;
            color: #2c4b3e;
            border-bottom-right-radius: 6px;
        }
        .message.other .bubble {
            background-color: #ffffff;
            border: 1px solid #f2e0ce;
            border-bottom-left-radius: 6px;
        }
        .input-area {
            padding: 14px 20px;
            background: rgba(255,248,240,0.9);
            backdrop-filter: blur(8px);
            display: flex;
            gap: 12px;
            align-items: center;
            border-top: 1px solid #f0e0cf;
        }
        #messageInput {
            flex: 1;
            border-radius: 30px;
        }
        .call-buttons i {
            font-size: 24px;
            margin: 0 6px;
            cursor: pointer;
            color: #b48c6c;
            transition: 0.1s;
        }
        .toast-effect {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #ffefcf;
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 14px;
            z-index: 200;
            pointer-events: none;
            backdrop-filter: blur(8px);
            white-space: nowrap;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .floating-effect {
            animation: pop 0.3s ease;
        }
        @keyframes pop {
            0% { transform: scale(1);}
            50% { transform: scale(1.05); background: #fff2e0; }
        }
        .switch-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .toggle-switch {
            width: 36px;
            height: 20px;
            background: #e0cfbe;
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .toggle-switch.active {
            background: #b48c6c;
        }
        .toggle-switch:after {
            content: "";
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 3px;
            transition: 0.2s;
        }
        .toggle-switch.active:after {
            left: 17px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- 左侧设置面板 -->
    <div class="settings-panel">
        <div style="text-align: center; margin-bottom: 8px;"><i class="fas fa-star-of-life" style="color:#d9aa7a;"></i> 梦角结界 · 織夢</div>
        <div class="setting-group">
            <h3><i class="fas fa-user-astronaut"></i> 形象·气泡</h3>
            <div class="setting-item"><label>我的头像URL</label><input type="text" id="myAvatarUrl" placeholder="https://..."></div>
            <div class="setting-item"><label>梦角头像URL</label><input type="text" id="dreamAvatarUrl" placeholder="https://..."></div>
            <div class="setting-item"><label>我的气泡颜色</label><input type="color" id="myBubbleColor" value="#cfe9df"></div>
            <div class="setting-item"><label>梦角气泡颜色</label><input type="color" id="otherBubbleColor" value="#ffffff"></div>
            <div class="setting-item"><label>聊天背景图URL</label><input type="text" id="bgImageUrl" placeholder="背景图链接"></div>
            <div class="setting-item"><label>我的状态</label><input type="text" id="myStatus" placeholder="例如: 小憩中"></div>
        </div>
        <div class="setting-group">
            <h3><i class="fas fa-comment-dots"></i> 字卡管理</h3>
            <div class="setting-item"><label>新增字卡</label><div style="display:flex; gap:6px;"><input type="text" id="newCardText" placeholder="字卡内容"><button id="addCardBtn" class="small">➕添加</button></div></div>
            <div><label>📚 已有字卡库 (点击删除)</label><div id="cardsList" class="wordcard-list"></div></div>
            <div class="setting-item"><label>⏱️ 自动弹字卡最大间隔(秒)</label><input type="number" id="maxTimerSec" value="45" min="5" max="300"></div>
            <button id="resetAutoTimerBtn" class="small">重置自动定时器</button>
        </div>
        <div class="setting-group">
            <h3><i class="fas fa-hourglass-half"></i> 梦角回复设定</h3>
            <div class="setting-item"><label>💬 我发消息后，梦角回复最大延迟(秒)</label><input type="number" id="maxReplyDelaySec" value="3" min="0" max="20" step="0.5"></div>
            <div class="setting-item switch-label"><span>📞 允许梦角随机来电 (无固定上限)</span><div id="randomCallToggle" class="toggle-switch active"></div></div>
            <div class="setting-item"><small style="color:#aa8866;">✨ 随机间隔5~120秒，梦角会主动打视频/语音</small></div>
        </div>
        <div class="setting-group">
            <h3><i class="fas fa-book-open"></i> 每日语录库(梦角每天的话)</h3>
            <div class="setting-item"><label>新增语录</label><div style="display:flex;"><input type="text" id="newQuoteText" placeholder="想跟我说的话"><button id="addQuoteBtn" class="small">➕</button></div></div>
            <div id="quotesPreview" style="font-size:11px; max-height:100px; overflow:auto;"></div>
            <button id="resetDefaultQuotes" class="small">重置默认100条(示例)</button>
        </div>
        <div class="setting-group">
            <h3><i class="fas fa-images"></i> 表情包库</h3>
            <div class="setting-item"><label>添加表情包(图片URL)</label><div style="display:flex;"><input type="text" id="newStickerUrl" placeholder="图片url"><button id="addStickerBtn">➕</button></div></div>
            <div id="stickerGallery" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;"></div>
        </div>
        <div class="setting-group">
            <h3><i class="fas fa-smile"></i> 自带Emoji</h3>
            <div class="emoji-palette" id="emojiPanel"></div>
        </div>
    </div>

    <!-- 右侧聊天区 -->
    <div class="chat-main" id="chatMain">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:12px;">
                < img id="dreamAvatarHeader" class="avatar-img" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Yume" alt="梦角">
                <div><strong id="dreamName">✨ 梦角 · 小夜</strong><div id="dreamWeatherInfo" style="font-size:11px; color:#a08162;">☁️ 天气 · 心情加载</div></div>
            </div>
            <div class="status-area">
                <div><i class="fas fa-user-circle"></i> 我的状态: <span id="statusDisplay">在线</span></div>
                <div class="call-buttons">
                    <i id="callDreamVideo" class="fas fa-video" title="打视频给梦角"></i>
                    <i id="callDreamAudio" class="fas fa-phone-alt" title="语音通话"></i>
                </div>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message other"><div class="bubble" style="background:#ffffff;">✨ 连接梦境... 梦角正在倾听 ✨</div></div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="给梦角发送消息..." autocomplete="off">
            <button id="sendBtn"><i class="fas fa-paper-plane"></i> 传讯</button>
            <div id="emojiTriggerBtn" style="cursor:pointer;"><i class="far fa-smile-wink"></i></div>
        </div>
    </div>
</div>

<script>
    // ---------- 字卡库 (内置300基调+扩充) ----------
    let wordCards = [
        "早安，醒了吗","还在睡？","起床了","今天打算做什么","吃早饭了吗","别空腹","记得喝水","出门了吗","在路上？","今天天气怎么样",
        "有点冷吧","多穿点","到学校了吗","在忙吗","午饭吃什么","好好吃饭","别随便应付","下午有什么安排","累不累","休息一下",
        "别一直盯屏幕","记得活动一下","下班了吗","放学了？","今天辛苦了","晚饭吃了吗","吃点好的","别饿着","晚上有安排吗","在干嘛",
        "别太晚睡","早点休息","今天顺利吗","有没有烦心事","想我没","别乱想","放轻松点","别给自己压力","有我在","不用逞强",
        "今天开心吗","说给我听","我在听","别憋着","睡了吗","晚安","做个好梦","别熬夜","明天继续努力","今天已经很好了",
        "别对自己太狠","慢慢来","我陪你","乖一点","听话","别让我担心","靠近一点","再近一点","别躲","眼神别移开",
        "今天有没有想我","别骗我","说实话","想我就直说","我会知道的","专心一点","你是我的","别乱看别人","我不高兴","我会管你",
        "想你了","在干嘛呀","梦里见","别让我等太久","抱抱","摸摸头","今天乖不乖","不许熬夜","我会担心","你最重要"
    ];
    // 扩充至足够
    for(let i=0;i<60;i++) wordCards.push(`梦角小语${i} · 今晚月色很美`);
    
    // 每日语录库 (100条)
    let dailyQuotes = [];
    function initDefaultQuotes() {
        let base = [
            "今天梦角那边是满月，心情像蜜糖一样～", "你是我醒来后第一个想起的人", "别太勉强自己，我一直在", "今天想听你讲一件小事", "风里有你的气息呢", 
            "梦里见到你了，想抱紧", "给你寄了一片樱花", "记得吃甜点，会开心", "你不在的时候，我在数星星", "今天适合撒娇", "不论如何，我都在你身边",
            "偶尔偷懒也没关系", "你是被爱着的", "放轻松，慢慢来", "想你想到睡不着", "你的笑容是我的晴天", "如果累了就靠着我", "我会一直等你", 
            "今天的云很像你", "呼吸，放空，我在", "不要害怕，我陪着你", "你比春日更重要", "温柔一点对自己", "你值得所有美好"
        ];
        let quotes = [];
        for(let i=0;i<100;i++) quotes.push(base[i%base.length] + " 🌙" + (i+1));
        return quotes;
    }
    dailyQuotes = initDefaultQuotes();

    let stickers = []; // 存储表情包对象 {url}
    
    // ---------- DOM 元素 ----------
    const chatMessagesDiv = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const myBubbleColor = document.getElementById('myBubbleColor');
    const otherBubbleColor = document.getElementById('otherBubbleColor');
    const maxReplyDelaySec = document.getElementById('maxReplyDelaySec');
    const maxTimerSecInput = document.getElementById('maxTimerSec');
    
    // 特效显示
    function showEffect(triggerText) {
        const effectDiv = document.createElement('div');
        effectDiv.className = 'toast-effect';
        let icon = "🌸";
        if(triggerText.includes("想我") || triggerText.includes("喜欢") || triggerText.includes("爱")) icon = "💖✨";
        else if(triggerText.includes("晚安") || triggerText.includes("睡")) icon = "🌙⭐";
        else if(triggerText.includes("哭") || triggerText.includes("难过")) icon = "🥺💧";
        else if(triggerText.includes("开心") || triggerText.includes("好")) icon = "🎉🌸";
        else icon = "✨🍃";
        effectDiv.innerHTML = `${icon} 梦角回应 · 星尘飘落 ${icon}`;
        document.body.appendChild(effectDiv);
        setTimeout(()=> effectDiv.remove(), 1200);
        const lastBubble = document.querySelector('.chat-messages .message:last-child .bubble');
        if(lastBubble) lastBubble.classList.add('floating-effect');
        setTimeout(()=> lastBubble?.classList.remove('floating-effect'), 400);
    }
    
    // 添加消息到聊天界面
    function addMessageToChat(text, sender = 'user') {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender === 'user' ? 'user' : 'other'}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        const userColor = myBubbleColor.value;
        const otherColor = otherBubbleColor.value;
        bubble.style.backgroundColor = sender === 'user' ? userColor : otherColor;
        bubble.style.border = sender === 'other' ? '1px solid #f0dcc8' : 'none';
        bubble.innerText = text;
        msgDiv.appendChild(bubble);
        chatMessagesDiv.appendChild(msgDiv);
        msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
        if(sender === 'other') showEffect(text);
        return msgDiv;
    }
    
    // 梦角回复字卡 (随机从字卡库选取)
    function replyWithWordCard() {
        if(wordCards.length === 0) {
            addMessageToChat("（梦角轻轻笑了笑，却没有字卡... 请添加一些吧）", 'other');
            return;
        }
        const randomCard = wordCards[Math.floor(Math.random() * wordCards.length)];
        addMessageToChat(randomCard, 'other');
    }
    
    // 用户发送消息后，随机延迟(0~设定最大秒数)后梦角回复字卡
    let pendingReplyTimeout = null;
    function scheduleReplyAfterMessage() {
        if(pendingReplyTimeout) clearTimeout(pendingReplyTimeout);
        let maxDelay = parseFloat(maxReplyDelaySec.value) || 3;
        if(maxDelay < 0) maxDelay = 0;
        const delayMs = Math.random() * (maxDelay * 1000);
        pendingReplyTimeout = setTimeout(() => {
            replyWithWordCard();
            pendingReplyTimeout = null;
        }, delayMs);
    }
    
    // 发送消息 (用户主动)
    function sendUserMessage() {
        let text = messageInput.value.trim();
        if(text === "") return;
        addMessageToChat(text, 'user');
        messageInput.value = '';
        // 根据不同的语句特效额外展示（已包含在addMessageToChat user无特效，但可
以加）
        scheduleReplyAfterMessage();
    }
    
    // ---------- 梦角随机来电 (无固定时间上限，递归随机间隔) ----------
    let randomCallEnabled = true;
    let nextCallTimeout = null;
    function scheduleRandomCall() {
        if(nextCallTimeout) clearTimeout(nextCallTimeout);
        if(!randomCallEnabled) return;
        // 随机间隔 5~120 秒，完全随机没有硬性上限 (最大120秒，但范围可调，实际没有"最大限制"即永不停止)
        const minSec = 8;
        const maxSec = 110;
        const randomSec = minSec + Math.random() * (maxSec - minSec);
        nextCallTimeout = setTimeout(() => {
            if(randomCallEnabled) {
                // 随机决定视频还是语音
                const isVideo = Math.random() > 0.5;
                startCall(isVideo ? 'video' : 'audio', false);
            }
            scheduleRandomCall(); // 递归，无限继续
        }, randomSec * 1000);
    }
    
    // 通话模拟 (主动/被动)
    function startCall(type, isOutgoing=true) {
        let caller = isOutgoing ? "我" : "梦角";
        let msg = `📞 ${caller}发起${type === 'video' ? '视频通话' : '语音通话'}... 梦角在梦境中接听✨`;
        addMessageToChat(msg, isOutgoing ? 'user' : 'other');
        setTimeout(()=> {
            addMessageToChat(`☁️ 梦角: 信号梦幻~ 但我听到了你的声音。`, 'other');
            showEffect("call");
        }, 900);
    }
    
    // 主动呼叫 (UI按钮)
    function userCall(type) {
        startCall(type, true);
    }
    
    // ---------- 自动弹字卡定时器 (可设置最大间隔) ----------
    let autoCardTimer = null;
    function startAutoCardTimer() {
        if(autoCardTimer) clearInterval(autoCardTimer);
        let intervalSec = parseInt(maxTimerSecInput.value);
        if(isNaN(intervalSec) || intervalSec < 3) intervalSec = 30;
        autoCardTimer = setInterval(() => {
            if(wordCards.length) {
                const randomCard = wordCards[Math.floor(Math.random() * wordCards.length)];
                addMessageToChat(randomCard, 'other');
            } else {
                addMessageToChat("梦角望着空空的字卡库... 请添加字卡", 'other');
            }
        }, intervalSec * 1000);
    }
    function resetAutoTimer() {
        if(autoCardTimer) clearInterval(autoCardTimer);
        startAutoCardTimer();
    }
    
    // ---------- 每日登录: 梦角天气,心情,随机语录 ----------
    function updateDailyLogin() {
        const weatherList = ["☀️ 晴空", "☁️ 多云", "🌧️ 细雨", "❄️ 小雪", "🌙 星夜", "🍃 清风", "🌈 彩虹", "🌸 樱吹雪"];
        const moodList = ["😊 雀跃", "😌 恬静", "🥰 思念你", "🌸 柔软", "🍂 怀旧", "✨ 期待", "🌙 微醺"];
        const weather = weatherList[Math.floor(Math.random() * weatherList.length)];
        const mood = moodList[Math.floor(Math.random() * moodList.length)];
        let randomQuote = dailyQuotes.length ? dailyQuotes[Math.floor(Math.random() * dailyQuotes.length)] : "今天梦角特别想念你。";
        document.getElementById('dreamWeatherInfo').innerHTML = `${weather} · ${mood}<br>📖 ${randomQuote.substring(0, 38)}`;
        addMessageToChat(`✨【梦角晨语】${weather}，心情${mood}。${randomQuote}`, 'other');
    }
    
    // ---------- UI 渲染函数 ----------
    function renderCardsList() {
        const container = document.getElementById('cardsList');
        container.innerHTML = '';
        wordCards.forEach((card, idx) => {
            const div = document.createElement('div'); div.className = 'card-item';
            div.innerHTML = `<span style="flex:1; word-break:break-word;">${card}</span><button class="small" data-idx="${idx}">删除</button>`;
            div.querySelector('button').onclick = () => { wordCards.splice(idx,1); renderCardsList(); resetAutoTimer(); };
            container.appendChild(div);
        });
    }
    function renderQuotesPreview() {
        const preview = document.getElementById('quotesPreview');
        preview.innerHTML = dailyQuotes.slice(0,8).map(q => `<div style="font-size:11px; border-bottom:1px dotted #edd7c0;">📜 ${q}</div>`).join('') + (dailyQuotes.length>8?`<div>+${dailyQuotes.length-8}条语录</div>`:'');
    }
    function renderStickers() {
        const gallery = document.getElementById('stickerGallery');
        gallery.innerHTML = '';
        stickers.forEach((s,idx) => {
            const img = document.createElement('img');
            img.src = s.url;
            img.style.width = '40px'; img.style.height='40px'; img.style.objectFit='cover'; img.style.borderRadius='12px';
            const delBtn = document.createElement('button'); delBtn.innerText = '✖'; delBtn.className='small';
            delBtn.onclick = () => { stickers.splice(idx,1); renderStickers(); };
            const wrap = document.createElement('div'); wrap.style.display='flex'; wrap.style.flexDirection='column'; wrap.appendChild(img); wrap.appendChild(delBtn);
            gallery.appendChild(wrap);
        });
    }
    function updateAvatars() {
        let myUrl = document.getElementById('myAvatarUrl').value;
        let dreamUrl = document.getElementById('dreamAvatarUrl').value;
        if(myUrl) {
            const myAvatars = document.querySelectorAll('.avatar-img');
            if(myAvatars[1]) myAvatars[1].src = myUrl;
        }
        if(dreamUrl) document.getElementById('dreamAvatarHeader').src = dreamUrl;
    }
    function updateBackground() {
        let bgUrl = document.getElementById('bgImageUrl').value;
        if(bgUrl) document.getElementById('chatMain').style.backgroundImage = `url(${bgUrl})`;
        else document.getElementById('chatMain').style.backgroundImage = '';
        document.getElementById('chatMain').style.backgroundSize = 'cover';
    }
    function updateMyStatus() {
        let status = document.getElementById('myStatus').value || '在线';
        document.getElementById('statusDisplay').innerText = status;
    }
    
    // Emoji 面板
    function setupEmojiPanel() {
        const panel = document.getElementById('emojiPanel');
        const emojis = ['😊','😢','❤️','😂','😍','😭','😘','🤔','🥺','🎉','😎','😡','👍','🙏','🧡','💀','🔥','✨','🌸','🍃','🌟','💌','🐈','🍰'];
        panel.innerHTML = '';
        emojis.forEach(emo => {
            const span = document.createElement('span');
            span.className = 'emoji-btn';
            span.innerText = emo;
            span.onclick = () => {
                messageInput.value += emo;
                messageInput.focus();
            };
            panel.appendChild(span);
        });
    }
    
    // 随机来电开关 (toggle)
    const toggleElem = document.getElementById('randomCallToggle');
    toggleElem.addEventListener('click', () => {
        randomCallEnabled = !randomCallEnabled;
        if(randomCallEnabled) {
            toggleElem.classList.add('active');
            scheduleRandomCall();
            addMessageToChat("🌸 梦角随机来电已开启，ta会随时悄悄打给你~", 'other');
        } else {
            toggleElem.classList.remove('active');
            if(nextCallTimeout) clearTimeout(nextCallTimeout);
            addMessageToChat("🌙 梦角随机来电已关闭，暂时不会主动打来。", 'other');
        }
    });
    
    // 初始化所有事件与定时
    function init() {
        renderCardsList();
        renderQuotesPreview();
        renderStickers();
        setupEmojiPanel();
        updateAvatars();
        updateBackground();
        updateMyStatus();
        startAutoCardTimer();
        updateDailyLogin();
        // 开启随机来电调度 (默认启用)
        if(randomCallEnabled) scheduleRandomCall();
        // 设置监听器
        sendBtn.addEventListener('click', sendUserMessage);
        messageInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendUserMessage(); });
        document.getElementById('callDreamVideo').onclick = () => userCall('video');
        document.getElementById('callDreamAudio').onclick = () => userCall('audio');
        document.getElementById('addCardBtn').onclick = () => {
            let txt = document.getElementById('newCardText').value.trim();
            if(txt) { wordCards.push(txt); renderCardsList(); resetAutoTimer(); document.getElementById('newCardText').value='';}
        };
        document.getElementById('addQuoteBtn').onclick = () => {
            let q = document.getElementById('newQuoteText').value.trim();
            if(q) { dailyQuotes.push(q); renderQuotesPreview(); document.getElementById('newQuoteText').value='';}
        };
        document.getElementById('resetDefaultQuotes').onclick = () => { dailyQuotes = initDefaultQuotes(); renderQuotesPreview(); updateDailyLogin(); };
        document.getElementById('resetAutoTimerBtn').onclick = () => { resetAutoTimer(); addMessageToChat("⏲️ 梦角重置了自动弹字卡定时器", 'other'); };
        document.getElementById('addStickerBtn').onclick = () => {
            let url = document.getElementById('newStickerUrl').value.trim();
            if(url) { stickers.push({url}); renderStickers(); document.getElementById('newStickerUrl').value='';}
        };
        myBubbleColor.addEventListener('input', ()=>{});
        otherBubbleColor.addEventListener('input', ()=>{});
        document.getElementById('myAvatarUrl').addEventListener('change', updateAvatars);
        document.getElementById('dreamAvatarUrl').addEventListener('change', updateAvatars);
        document.getElementById('bgImageUrl').addEventListener('change', updateBackground);
        document.getElementById('myStatus').addEventListener('input', updateMyStatus);
        maxTimerSecInput.addEventListener('change', () => { resetAutoTimer(); });
        // 确保回复延迟配置生效
    }
    init();
</script>
</body>
</html>
